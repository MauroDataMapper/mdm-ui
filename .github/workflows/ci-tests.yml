name: CI Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./mdm-ui


    steps:
      - uses: actions/checkout@v4
        with:
          path: ./mdm-ui

      - name: Install and configure
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'

      - name: Install tools
        run: |
          npm i -g npm@10.2.3
          npm i -g @angular/cli
          npm i -g symlinked
          npm i -g npm-check

      - name: Check tool versions
        run: |
          node --version
          npm --version


      - name: Clean install dependencies
        run: |
          npm config set registry https://registry.npmjs.org/
          npm install

      #########
      #     Link a local copy of mdm-resources
      #########
      - name: Checkout mdm-resources
        if: success() && github.ref != 'refs/heads/main'
        # working-directory: ./mdm-resources
        uses: actions/checkout@v4
        with:
          repository: MauroDataMapper/mdm-resources
          ref: refs/heads/develop # change to test against a different branch, but always change back to develop before merge
          path: ./mdm-resources

      - name: Build mdm-resources
        if: success() && github.ref != 'refs/heads/main'
        working-directory: ./mdm-resources
        run: |
          npm install
          npm run build
          npm link

      # Back in the (default) mdm-ui directory
      - name: Link mdm-resources
        if: success() && github.ref != 'refs/heads/main'
        run: |
          npm link @maurodatamapper/mdm-resources

      - name: Report links
        run: symlinked names

      - name: License header check
        run: npm run license-check check

      - name: Check tool versions (again)
        run: |
          node --version
          npm --version
          npx tsc --version
          npx jest --version
          npm ls jsdom jest ts-jest @angular/core
          printenv | grep -v -i 'token\|secret\|key' | sort
          echo "${{ toJson(env) }}"

      - name: Run tests
        run: npx jest --coverage

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: mdm-ui/test-report/junit.xml

      - name: Run ESLint (junit + sarif)
        run: |
          npm run eslint-junit || true
          npm run eslint-sarif || true

      - name: Upload ESLint junit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-junit
          path: mdm-ui/eslint/eslint-junit.xml

      - name: Upload ESLint SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-sarif
          path: mdm-ui/eslint/eslint_report.sarif

      - name: Build distribution with original theme
        run: npm run dist

      - name: Build distribution with nhs digital theme
        run: npm run dist
        env:
          MDM_UI_THEME_NAME: nhs-digital

      - name: Upload distribution artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: mdm-ui/dist/*.tgz