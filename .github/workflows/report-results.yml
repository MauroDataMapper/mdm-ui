name: Report Test Results & Notify

on:
  workflow_run:
    workflows: ["CI Tests"]
    types: [completed]

permissions:
  contents: read
  checks: write
  statuses: write
  actions: write

jobs:
  report:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name:
          Debug list artifacts from triggering run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering run id: ${{ github.event.workflow_run.id }}"
          curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts" \
            | jq .

      - name: List downloaded artifacts (debug)
        run: |
          ls -R artifacts || true

      - name: Download test-results artifact
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: artifacts/test-results

      - name: Download eslint-junit artifact
        uses: actions/download-artifact@v4
        with:
          name: eslint-junit
          path: artifacts/eslint-junit

      - name: Download eslint-sarif artifact
        uses: actions/download-artifact@v4
        with:
          name: eslint-sarif
          path: artifacts/eslint-sarif

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: artifacts/dist

      - name: Publish Test report (dorny)
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: artifacts/test-results/junit.xml
          reporter: java-junit

      - name: Publish ESLint report (dorny)
        uses: dorny/test-reporter@v1
        with:
          name: ESLint Results
          path: artifacts/eslint-junit/eslint-junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload EsLint scan results to GitHub Security tab (SARIF)
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: artifacts/eslint-sarif/eslint_report.sarif

      - name: Archive distribution artifacts to snapshot repo
        if: ${{ always() && ( github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'develop' ) }}
        run: |
          echo "Uploading dist tgz files..."
          for i in artifacts/dist/*.tgz; do
            echo "Uploading $i..."
            curl -X PUT -H "X-Generate-Checksums: true" -u ${{secrets.MAURO_SNAPSHOT_REPOSITORY_USERNAME}}:${{secrets.MAURO_SNAPSHOT_REPOSITORY_PASSWORD}} -T "$i" "https://mauro-repository.com/artifacts-snapshots/mauroDataMapper/mdm-ui/$(basename $i)"
          done

      - name: Send a stream message to Zulip
        uses: zulip/github-actions-zulip/send-message@v1
        with:
          api-key: ${{ secrets.ZULIP_API_KEY }}
          email: "githubactionsbot-bot@maurodatamapper.zulipchat.com"
          organization-url: "https://maurodatamapper.zulipchat.com"
          to: "build/github-actions"
          type: "stream"
          topic: "${{ github.event.workflow_run.head_repository.full_name }}"
          content: |
            ${{ github.event.workflow_run.conclusion == 'success' && ':check_mark:' || ':cross_mark:' }} \
            ${{ github.event.workflow_run.head_repository.full_name }} : **${{ github.event.workflow_run.head_branch }}** \
            GitHub Actions build result: **${{ github.event.workflow_run.conclusion }}**
            ${{ github.event.workflow_run.html_url }}