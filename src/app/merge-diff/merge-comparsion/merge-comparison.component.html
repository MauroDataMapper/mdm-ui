<div class="comparison-container" *ngIf="mergeItem">
  <div class="comparison-header">
    <div class="item-summary">
      <div class="summary-badges">
        <span
          class="type-badge"
          [ngClass]="{
            'creation-badge': isCreation,
            'deletion-badge': isDeletion,
            'modification-badge': isModification
          }"
        >
          {{ getDetailTitle() }}
        </span>
        <span class="status-badge" [ngClass]="{ 'conflict-badge': mergeItem.isMergeConflict }">
          {{ getCurrentStatus() }}
        </span>
      </div>

      <div class="item-path">
        <mdm-location-path [path]="mergeItem.path" [compact]="true" [skipFirst]="true"></mdm-location-path>
      </div>
    </div>

    <div class="comparison-actions">
      <button
        mat-stroked-button
        type="button"
        (click)="acceptCommit(MergeUsed.Source)"
      >
        <span class="fas fa-file-export" aria-hidden="true"></span>
        Apply change
      </button>

      <button
        mat-stroked-button
        type="button"
        (click)="cancelCommit()"
      >
        <span class="fas fa-file-import" aria-hidden="true"></span>
        Keep target
      </button>

      <button
        *ngIf="isModification"
        mat-stroked-button
        type="button"
        (click)="openEditor()"
      >
        <span class="fas fa-edit" aria-hidden="true"></span>
        Open editor
      </button>

      <button
        *ngIf="isModification && !linkScroll"
        mat-stroked-button
        type="button"
        (click)="linkScrolls(true)"
      >
        <span class="fas fa-link" aria-hidden="true"></span>
        Link scroll
      </button>

      <button
        *ngIf="isModification && linkScroll"
        mat-stroked-button
        type="button"
        (click)="linkScrolls(false)"
      >
        <span class="fas fa-unlink" aria-hidden="true"></span>
        Unlink scroll
      </button>
    </div>
  </div>

  <div class="comparison-body" *ngIf="isModification; else simpleChange">
    <div class="comparison-column before-column">
      <div class="column-header">{{ getBeforeBranchLabel() }}</div>
      <div
        class="column-content"
        #targetContent
        (mouseenter)="updateCurrentElement('targetContent')"
        (scroll)="updateVerticalScroll($event)"
      >
        <div class="diff-view" [innerHTML]="targetText | safe: 'html'"></div>
      </div>
    </div>

    <div class="comparison-column after-column">
      <div class="column-header">{{ getAfterBranchLabel() }}</div>
      <div
        class="column-content"
        #sourceContent
        (mouseenter)="updateCurrentElement('sourceContent')"
        (scroll)="updateVerticalScroll($event)"
      >
        <div class="diff-view" [innerHTML]="getAfterHtml() | safe: 'html'"></div>
      </div>
    </div>
  </div>

  <ng-template #simpleChange>
    <div class="simple-change-panel">
      <div class="column-header">{{ getSimpleBranchLabel() }}</div>
      <div class="simple-change-content">
        <pre class="simple-value">{{ simpleDisplayText }}</pre>
      </div>
    </div>
  </ng-template>
</div>
