<h4 mat-dialog-title>Edit Profile - {{ data.profileName }}</h4>
<p *ngIf="description">
  {{ description }}
</p>
<mat-dialog-content class="mat-typography">
  <form
    #userForm="ngForm"
    id="userForm"
    novalidate
    enctype="multipart/form-data"
    method="POST"
  >
    <mdm-alert
      *ngIf="data.finalised && showCanEditPropertyAlert"
      alertStyle="info"
      showIcon="true"
    >
      Only certain fields can be edited on this profile as the catalogue item is
      finalised.
    </mdm-alert>
    <table
      *ngIf="this.profileData.sections.length > 0"
      class="table table-bordered"
      role="presentation"
    >
      <tbody>
        <tr mdm-edit-profile-section
          *ngFor="let section of this.profileData?.sections"
          [profileSection]="section">
        </tr>
      </tbody>
    </table>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end" class="pt-2 pb-2">
  <div>
    <span *ngIf="isValidated && validationErrors.total === 0" class="mr-2">
      <span class="fas fa-check-circle success"></span>
      Profile is valid
    </span>
    <span *ngIf="isValidated && validationErrors.fieldTotal > 0" class="mr-2">
      <span
        class="fas fa-exclamation-triangle warning"
        style="color: #f19e3f"
      ></span>
      There are {{ validationErrors.fieldTotal }} field(s) with issues
    </span>
    <button
      mat-button
      color="warn"
      style="margin-right: 8px"
      (click)="onCancel()"
    >
      Cancel
    </button>
    <button
      mat-button
      color="primary"
      type="submit"
      class="custom"
      (click)="validate()"
    >
      Validate
    </button>
    <button
      mat-flat-button
      color="primary"
      type="submit"
      class="custom"
      (click)="save()"
    >
      {{ okBtnText }}
    </button>
  </div>
</mat-dialog-actions>
