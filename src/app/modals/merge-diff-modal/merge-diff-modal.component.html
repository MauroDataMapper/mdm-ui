<div class="mdm-merge-diff-modal">
  <h4 mat-dialog-title class="merge-diff-title">
    Merge Changes
    <button mat-icon-button class="close-modal" (click)="onClose()" aria-label="Close">
      <mat-icon>close</mat-icon>
    </button>
  </h4>

  <mat-dialog-content class="merge-diff-dialog-content">
    <div class="merge-diff-content">
      <mdm-merge-diff-container
        [sourceId]="data.sourceId"
        [targetId]="data.targetId"
        [catalogueDomainType]="data.catalogueDomainType"
        (mergeComplete)="onMergeComplete()">
      </mdm-merge-diff-container>
    </div>
  </mat-dialog-content>
</div>
