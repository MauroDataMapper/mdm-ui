<nav aria-label="breadcrumb" class="location-path" [ngClass]="{ compact: compact }">
  <span *ngIf="!compact" >
    <span class="fas fa-map-marker-alt" matTooltip="Location"></span>
    <strong>Location: </strong>
  </span>
  <ol>
    <li class="breadcrumb-item" *ngIf="loading">
      <small>Locating...</small>
    </li>
    <li
      class="breadcrumb-item"
      *ngIf="!loading && (!items || items.length === 0)"
    >
      Root item
    </li>
    <li class="breadcrumb-item" *ngFor="let item of items">
      <span class="breadcrumb-content">
        <mat-icon
          fontSet="fas"
          [fontIcon]="item.icon"
          [ngClass]="'dataModelTypeIcon segment-icon'"
          [attr.aria-label]="(item.typeName || item.label) + ' icon'"
          [matTooltip]="item.typeName || item.label"
        ></mat-icon>

        <a [attr.href]="item.href || null" [ngClass]="{ 'plain-item': !item.href }">
          <span>{{ item.label }}</span>
          <span *ngIf="item.branchName" class="model-suffix">
            <span class="fas fa-code-branch"></span>
            {{ item.branchName }}</span
          >
          <span *ngIf="item.modelVersion && !item.modelVersionTag" class="model-suffix">
            <span class="fas fa-file-alt"></span>{{ item.modelVersion }}</span
          >
          <span *ngIf="item.modelVersionTag" class="model-suffix">
            <span class="fas fa-tag"></span>{{ item.modelVersionTag }}</span
          >
          <span *ngIf="item.versionOrBranch" class="model-suffix">
            <span class="fas fa-code-branch"></span>{{ item.versionOrBranch }}</span
          >
          <span *ngIf="item.propertyName" class="model-suffix property-suffix">
            <span class="fas fa-at"></span>{{ item.propertyName }}</span
          >
        </a>
      </span>
    </li>
  </ol>
</nav>
