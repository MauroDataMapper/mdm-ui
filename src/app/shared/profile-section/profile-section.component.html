<td colspan="100%" style="padding: 0;">
  <table class="table table-bordered" style="width: 100%" role="presentation">
    <tbody>
    <tr>
      <td [attr.colspan]="2" class="detailsRowHeader">
        {{ profileSection.label }}
        <p *ngIf="profileSection.description" style="font-weight: normal">
          <small>{{ profileSection.description }}</small>
        </p>

      </td>
    </tr>
    <tr *ngFor="let field of profileSection.fields">
      <td class="detailsRowHeader">
        {{ field.fieldName }}
        <span
          *ngIf="field.description"
          style="float: right"
          class="fas fa-info-circle helpIcon"
          [matTooltip]="field.description"
          matTooltipPosition="after"
        ></span>
      </td>
      <td class="elementDetailDescription">
        <mdm-content-editor
          [(content)]="field.currentValue"
          id="{{ field.fieldName }}"
          [inEditMode]="false"
          *ngIf="field.dataType === 'text'"
        ></mdm-content-editor>
        <input
          type="checkbox"
          *ngIf="formOptionsMap[field.dataType] === 'checkbox'"
          style="
            width: 20px;
            height: 20px;
            position: relative;
            vertical-align: middle;
          "
          [readonly]="true"
          [checked]="field.currentValue === 'true'"
          (click)="$event.preventDefault()"
          name="{{ field.fieldName }} + {{ profileSection.label }}"
        />

        <input
          *ngIf="
            field.dataType !== 'folder' &&
            field.dataType !== 'model' &&
            field.dataType != 'text' &&
            field.dataType != 'date' &&
            field.dataType != 'datetime' &&
            field.dataType != 'boolean'
          "
          style="background-color: #ffffff; width: 100%; border: hidden"
          [readonly]="true"
          type="{{ formOptionsMap[field.dataType] }}"
          [(ngModel)]="field.currentValue"
          value="field.currentValue"
        />
        <input
          *ngIf="field.dataType === 'date' && field.currentValue && field.currentValue != ''"
          style="background-color: #ffffff; border: hidden"
          [readonly]="true"
          type="date"
          [(ngModel)]="field.currentValue"
          value="{{ field.currentValue }}"
        />
        <input
          style="background-color: #ffffff; border: hidden"
          *ngIf="field.dataType === 'datetime'"
          type="datetime-local"
          [readonly]="true"
          [(ngModel)]="field.currentValue"
          value="{{ field.currentValue }}"
        />
        <div *ngIf="field.dataType === 'model'">
          <mdm-more-description
            [description]="field.currentValue"
          ></mdm-more-description>
        </div>
        <div *ngIf="field.dataType === 'folder'">
          {{ field.currentValue }}
        </div>
      </td>
    </tr>
    <tr style="height: 2em;"></tr>
    <tr
      *ngFor="let section of this.profileSection.sections"
      mdm-profile-section
      [profileSection]="section">
    </tr>

    </tbody>
  </table>
</td>
